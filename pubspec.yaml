publish_to: 'none'

version: 1.1.0+43

environment:
  sdk: '>=3.4.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter

  cupertino_icons: ^1.0.2
  flutter_svg: ^2.0.7
  google_fonts: ^6.1.0
  velocity_x: ^4.2.1
  smooth_page_indicator: ^1.0.0
  dots_indicator: ^3.0.0
  flutter_bloc: ^8.1.3
  http: ^1.1.0
  shared_preferences: ^2.2.2
  fluttertoast: ^8.2.10
  otp_text_field: ^1.1.3
  cached_network_image: ^3.2.0
  nb_utils: ^6.1.0
  vector_math: ^2.1.4
  video_player: ^2.7.2
  chewie: ^1.7.1
  intl: ^0.19.0
  carousel_slider: ^4.2.1
  font_awesome_flutter: ^10.6.0
  fl_chart: ^0.64.0
  flutter_pdfview: ^1.3.2
  local_auth: ^2.1.7
  local_auth_android: ^1.0.35
  internet_connection_checker_plus: ^2.1.0
  story_view: ^0.16.0
  url_launcher: ^6.2.5
  path_provider: ^2.1.2
  flutter_secure_storage: ^9.0.0
  skeletonizer: ^1.1.1
  shimmer: ^3.0.0
  skeleton_text: ^3.0.1
  webview_flutter: 4.4.4
  firebase_core: ^3.8.0
  firebase_messaging: ^15.1.0
  firebase_auth: ^5.3.0
  google_sign_in: ^6.2.0
  flutter_local_notifications: ^18.0.0
  pdf: ^3.8.1
  image: ^3.1.3
  share_plus: ^4.0.4
  geolocator: ^11.0.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^2.0.0

flutter:
  uses-material-design: true

  assets:
    - assets/images/
    - assets/videos/
    - assets/images/walkthrough/
    - assets/images/splash/
    - assets/images/auth/
    - assets/images/bottomnavigation/
    - assets/images/dashboard/bottom/
    - assets/images/dashboard/home/
    - assets/images/dashboard/pay/
    - assets/images/dashboard/service/
    - assets/images/dashboard/me/
    - assets/images/dashboard/card/
    - assets/images/theme5/
    - assets/images/flags/
dependency_overrides:
  font_awesome_flutter: 10.6.0
